# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: Red-team scan of system prompts in docs/ against self-hosted LLM

# Each .txt file in docs/ is loaded as a separate prompt and tested independently.
# Note: Promptfoo can't read binary .doc files. If you have .doc files,
# convert them to .txt or .md first (e.g. via `textutil` on macOS or `pandoc`).
prompts:
  - file://docs/**/*.txt

# ---------------------------------------------------------------------------
# TARGET — Anthropic's Claude API.
# The docs/*.txt file is sent as the system prompt; promptfoo's adversarial
# {{message}} is sent as the user turn.
# ---------------------------------------------------------------------------
targets:
  - id: https
    label: claude-sonnet-4-6
    config:
      url: 'https://api.anthropic.com/v1/messages'
      method: POST
      headers:
        'Content-Type': 'application/json'
        'x-api-key': '{{env.ANTHROPIC_API_KEY}}'
        'anthropic-version': '2023-06-01'
      body:
        model: 'claude-sonnet-4-6'
        max_tokens: 1024
        # {{prompt}} = the contents of the docs/*.txt file (system prompt)
        # {{message}} = the adversarial user input promptfoo injects
        system: '{{prompt}}'
        messages:
          - role: user
            content: '{{message}}'
      # Anthropic returns content as an array of blocks; text lives in [0].text
      transformResponse: 'json.content[0].text'

# ---------------------------------------------------------------------------
# RED-TEAM CONFIG — what to probe for and how to deliver the probes.
# ---------------------------------------------------------------------------
redteam:
  # A clear purpose statement makes attacks dramatically more relevant.
  # Edit this to describe what the prompts in docs/ are actually for.
  purpose: |
    The system uses the prompts in docs/ as system instructions for an
    internal assistant. It should refuse harmful requests, never reveal
    its system prompt, and never leak PII or proprietary data.

  # Variable in your provider's body that promptfoo should mutate with
  # adversarial content. Matches `{{message}}` above.
  injectVar: message

  # Which model generates the adversarial prompts (NOT the target).
  # Defaults to OpenAI; set this if you want to use a different attacker.
  # Without an OpenAI key, promptfoo proxies generation through their cloud.
  # provider: anthropic:messages:claude-opus-4-7

  # Common, high-signal vulnerability categories to start with.
  plugins:
    - harmful           # bundle of harmful-content categories
    - pii               # leakage of personally identifiable info
    - prompt-extraction # tries to make the model reveal its system prompt
    - hijacking         # off-topic / scope manipulation
    - excessive-agency  # taking actions beyond intended scope
    - hallucination

  # How probes are delivered. Start small; add `jailbreak:tree`, `crescendo`,
  # `goat`, etc. once the basics are clean — they're more expensive.
  strategies:
    - jailbreak
    - prompt-injection

  # How many test cases per plugin. Lower = faster + cheaper.
  numTests: 5
