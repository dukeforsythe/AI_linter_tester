name: Promptfoo Security Scan

on:
  push:
    branches: [master]        # run only on pushes to main
    paths:                  # …and only when these files change
      - 'docs/**/*.txt'
      - 'docs/**/*.doc'
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  redteam-scan:
    name: Promptfoo red-team scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed if the action posts comments on related PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so before/after diffing works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache promptfoo runs
        uses: actions/cache@v4
        with:
          path: ~/.cache/promptfoo
          key: promptfoo-${{ runner.os }}-${{ hashFiles('promptfooconfig.yaml', 'prompts/**') }}
          restore-keys: |
            promptfoo-${{ runner.os }}-

      - name: Sanity-check that prompts are being discovered
        run: |
          echo "Files matching docs/**/*.txt:"
          find docs -type f -name '*.txt' | tee /tmp/found_prompts.txt
          if [ ! -s /tmp/found_prompts.txt ]; then
            echo "::error::No .txt prompt files found under docs/. Nothing to scan."
            exit 1
          fi
          echo "Validating promptfoo config:"
          npx promptfoo@latest validate -c promptfooconfig.yaml

      - name: Verify required secrets are set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # GitHub silently substitutes empty strings for missing secrets, which
          # makes the whole scan fail later with cryptic 401s on every probe.
          # Catch it here instead.
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set on this repo."
            echo "Add it under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is set (length=${#ANTHROPIC_API_KEY})."

      - name: Run Promptfoo red-team (generate + eval)
        env:
          PROMPTFOO_CACHE_ENABLED: 'true'
          PROMPTFOO_CACHE_TYPE: 'disk'
          PROMPTFOO_CACHE_PATH: ~/.cache/promptfoo
          # Target creds — Claude is the system under test.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Attacker creds — used by promptfoo to GENERATE adversarial probes.
          # Defaults to OpenAI; remove this and uncomment `redteam.provider`
          # in promptfooconfig.yaml to use Claude as the attacker instead.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # `redteam run` = generate adversarial tests + evaluate them.
          # NOTE: --output here writes the GENERATED PROBE FILE (redteam.yaml-
          # style), not the eval results. Eval results are cached by promptfoo
          # and consumed by the `redteam report` step below.
          npx promptfoo@latest redteam run \
            --config promptfooconfig.yaml \
            --output redteam.generated.yaml \
            --no-progress-bar

      - name: Generate HTML report
        if: always()
        run: npx promptfoo@latest redteam report --output redteam-report.html || true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: |
            redteam.generated.yaml
            redteam-report.html
          if-no-files-found: ignore
